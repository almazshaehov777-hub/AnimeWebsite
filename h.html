<div class="card" data-id="${anime.id}">
    <div class="info">
    <img src="${anime.imagePath}" alt="${anime.title}">
    <div class="cardInfo">
        <div class="title">${anime.title}</div>
            <div class="details">
                <span class="rating">${anime.rating}</span>
                <span class="year">${anime.year} • ${anime.episodes} эп.</span>
            </div>
        </div>
        </div>
    </div>
